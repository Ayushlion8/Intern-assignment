services:
  - type: web
    name: keyframe-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GCP_PROJECT_ID
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
        description: "Paste the entire GCP service account JSON here for cloud deployment"
      - key: GLOBAL_RPM
        value: "120"
    plan: starter
